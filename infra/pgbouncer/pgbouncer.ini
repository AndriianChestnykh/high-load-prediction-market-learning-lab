[databases]
playground = host=postgres port=5432 dbname=playground

[pgbouncer]
listen_port      = 6432
listen_addr      = *
auth_type        = md5
auth_file        = /etc/pgbouncer/userlist.txt

; ── The main knobs for experiment 02 ────────────────────────────────────────
; pool_mode: session | transaction | statement
pool_mode        = transaction

; Max connections PgBouncer opens toward Postgres (per database+user pair)
default_pool_size = 20

; Max simultaneous client connections across ALL pools
max_client_conn  = 200

; How long (ms) a client waits for a server connection before getting an error
query_wait_timeout = 30

; Keep-alive
server_idle_timeout = 60
client_idle_timeout = 300

; Logging (1 = log connections)
log_connections  = 1
log_disconnections = 1
log_pooler_errors = 1

; Admin
admin_users      = app
stats_users      = app

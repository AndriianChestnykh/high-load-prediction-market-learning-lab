global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The HTTP app runs on the HOST (not in compose) so the event loop can be
  # profiled with --inspect. Scrape it across the Docker bridge.
  - job_name: predmarket-http
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: pgbouncer
    static_configs:
      - targets: ["pgbouncer_exporter:9127"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

# k6 pushes its own metrics via remote-write (no scrape job needed); the
# receiver is enabled with --web.enable-remote-write-receiver in compose.
